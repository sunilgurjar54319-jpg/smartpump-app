name: Build APK Natively

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev tk-dev uuid-dev lzma-dev liblzma-dev zip unzip

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK with Buildozer (Auto-Detect Folder)
        run: |
          # Spec file ko automatic dhoondhna agar woh sub-folder me ho
          SPEC_PATH=$(find . -name "buildozer.spec" -print -quit)
          
          if [ -z "$SPEC_PATH" ]; then
            echo "ERROR: buildozer.spec file poori repository mein kahin nahi mili! Kripya check karein ki aapne file upload ki hai ya nahi."
            exit 1
          fi
          
          DIR_PATH=$(dirname "$SPEC_PATH")
          echo "Success: buildozer.spec mil gayi is folder mein: $DIR_PATH"
          cd "$DIR_PATH"
          
          # Run buildozer smoothly
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartPump-APK
          path: |
            **/bin/*.apk
            bin/*.apk
            
